<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>alger-temp</title>
    <script>
      // Apply theme immediately before any rendering to prevent flash
      (function() {
        var theme = localStorage.getItem('theme') || 'dark';
        if (theme === 'system') {
          if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
          }
        } else if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
        // Also apply cached accent color to prevent accent flash
        var accent = localStorage.getItem('theme-accent');
        if (accent) {
          document.documentElement.style.setProperty('--theme-accent-source', accent);
        }

        // Apply cached UI scale to prevent scale flash
        var scaleMap = {
          xs: { fontSize: '12px', tabFontSize: '11px', tabIconSize: '11px', tabPx: '7px', tabPy: '4px', tabGap: '4px' },
          sm: { fontSize: '14px', tabFontSize: '12px', tabIconSize: '12px', tabPx: '8px', tabPy: '5px', tabGap: '4px' },
          md: { fontSize: '16px', tabFontSize: '13px', tabIconSize: '13px', tabPx: '10px', tabPy: '6px', tabGap: '5px' },
          lg: { fontSize: '18px', tabFontSize: '15px', tabIconSize: '14px', tabPx: '11px', tabPy: '7px', tabGap: '6px' },
          xl: { fontSize: '20px', tabFontSize: '17px', tabIconSize: '16px', tabPx: '13px', tabPy: '8px', tabGap: '6px' }
        };
        var uiScale = localStorage.getItem('ui-scale') || 'lg';
        var tokens = scaleMap[uiScale] || scaleMap.lg;
        var ds = document.documentElement.style;
        ds.setProperty('--app-font-size', tokens.fontSize);
        ds.setProperty('--app-tab-font-size', tokens.tabFontSize);
        ds.setProperty('--app-tab-icon-size', tokens.tabIconSize);
        ds.setProperty('--app-tab-px', tokens.tabPx);
        ds.setProperty('--app-tab-py', tokens.tabPy);
        ds.setProperty('--app-tab-gap', tokens.tabGap);

        // Apply cached font family to prevent font flash
        var fontFamilyMap = {
          'system': '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif',
          'microsoft-yahei': '"Microsoft YaHei", "微软雅黑", sans-serif',
          'noto-sans': '"Noto Sans SC", "Noto Sans", sans-serif',
          'mono': '"JetBrains Mono", "Fira Code", "Cascadia Code", Consolas, monospace'
        };
        var fontFamily = localStorage.getItem('font-family') || 'system';
        var fontValue = fontFamilyMap[fontFamily] || fontFamilyMap.system;
        ds.setProperty('--app-font-family', fontValue);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
