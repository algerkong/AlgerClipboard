<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>alger-temp</title>
    <script>
      // Apply theme immediately before any rendering to prevent flash
      (function() {
        var theme = localStorage.getItem('theme') || 'dark';
        if (theme === 'system') {
          if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
          }
        } else if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
        // Also apply cached accent color to prevent accent flash
        var accent = localStorage.getItem('theme-accent');
        if (accent) {
          document.documentElement.style.setProperty('--theme-accent-source', accent);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
