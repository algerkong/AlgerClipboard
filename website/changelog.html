  <script src="./js/i18n.js"></script>

  <script>
    /**
     * Changelog renderer: fetches CHANGELOG.md, splits by language, renders with marked.js
     *
     * The CHANGELOG.md has paired sections:
     *   ## [1.6.0] - 2026-03-09        (English)
     *   ## [1.6.0] - 2026-03-09 (中文)  (Chinese)
     *
     * We split at `## ` boundaries and filter by language.
     */
    class ChangelogRenderer {
      constructor() {
        this.raw = '';
        this.lang = (window.i18n && window.i18n.currentLang) || 'zh-CN';
        this.container = document.getElementById('changelog-content');
        this.load();
      }

      async load() {
        try {
          const res = await fetch('./CHANGELOG.md');
          if (!res.ok) throw new Error(res.status);
          this.raw = await res.text();
          this.render();
        } catch (e) {
          this.container.innerHTML = '<p style="color:var(--text-secondary)">Failed to load changelog.</p>';
        }
      }

      setLang(lang) {
        this.lang = lang;
        if (this.raw) this.render();
      }

      render() {
        const isZh = this.lang === 'zh-CN';

        // Split into sections by ## headings (keep the heading with the content)
        const sections = this.raw.split(/(?=^## )/gm);

        // Filter: keep the top-level title line, then for each version keep only the matching language
        const filtered = sections.filter(section => {
          const trimmed = section.trim();
          // Keep the top "# Changelog" line
          if (trimmed.startsWith('# ') && !trimmed.startsWith('## ')) return false;
          // Separator lines
          if (trimmed === '---') return false;
          if (!trimmed) return false;

          // Check if this is a Chinese section
          const firstLine = trimmed.split('\n')[0];
          const isChinese = /\(中文\)/.test(firstLine);

          return isZh ? isChinese : !isChinese;
        });

        // Clean up: remove the "(中文)" tag from Chinese section headers for cleaner display
        const cleaned = filtered.map(s => {
          if (isZh) {
            return s.replace(/^(## \[.*?\] - [\d-]+)\s*\(中文\)/m, '$1');
          }
          return s;
        }).join('\n\n---\n\n');

        this.container.innerHTML = marked.parse(cleaned);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      window.changelogRenderer = new ChangelogRenderer();
    });
  </script>
</body>
