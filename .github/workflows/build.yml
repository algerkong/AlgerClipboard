name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Extract changelog for the release body
  changelog:
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.extract.outputs.body }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract changelog for current version
        id: extract
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract content between the first ## [version] and the next ## or ---
          BODY=$(awk -v ver="$VERSION" '
            BEGIN { found=0; collecting=0 }
            /^## \[/ {
              if (collecting) exit
              if (index($0, "[" ver "]")) { found=1; collecting=1; next }
            }
            /^---$/ {
              if (collecting) exit
            }
            collecting { print }
          ' CHANGELOG.md)

          if [ -z "$BODY" ]; then
            BODY="See the [CHANGELOG](https://github.com/algerkong/AlgerClipboard/blob/$GITHUB_REF_NAME/CHANGELOG.md) for details."
          fi

          # Write to output using delimiter
          {
            echo "body<<CHANGELOG_EOF"
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: changelog
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        run: pnpm install

      # Linux dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AlgerClipboard ${{ github.ref_name }}'
          releaseBody: ${{ needs.changelog.outputs.release_body }}
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  rapidocr-build:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            build_command: bash scripts/rapidocr/build-real-runtime.sh
            artifact_path: artifacts/rapidocr-real/macos-aarch64/rapidocr-macos-aarch64.zip
          - runner: windows-latest
            build_command: powershell -ExecutionPolicy Bypass -File scripts/rapidocr/build-real-runtime.ps1
            artifact_path: artifacts/rapidocr-real/windows-x86_64/rapidocr-windows-x86_64.zip
    runs-on: ${{ matrix.runner }}
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build RapidOCR runtime
        run: ${{ matrix.build_command }}

      - name: Upload RapidOCR build artifact
        uses: actions/upload-artifact@v4
        with:
          name: rapidocr-${{ matrix.runner }}
          path: ${{ matrix.artifact_path }}

  rapidocr-assets:
    needs: rapidocr-build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download RapidOCR build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/rapidocr-real
          pattern: rapidocr-*
          merge-multiple: true

      - name: Arrange RapidOCR artifacts
        run: |
          mkdir -p artifacts/rapidocr-real/macos-aarch64 artifacts/rapidocr-real/windows-x86_64
          if [ -f artifacts/rapidocr-real/rapidocr-macos-aarch64.zip ]; then
            mv artifacts/rapidocr-real/rapidocr-macos-aarch64.zip artifacts/rapidocr-real/macos-aarch64/
          fi
          if [ -f artifacts/rapidocr-real/rapidocr-windows-x86_64.zip ]; then
            mv artifacts/rapidocr-real/rapidocr-windows-x86_64.zip artifacts/rapidocr-real/windows-x86_64/
          fi

      - name: Generate RapidOCR descriptor
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          node scripts/rapidocr/generate-release-descriptor.mjs \
            --version "$VERSION" \
            --base-url "$BASE_URL" \
            --artifacts-root artifacts/rapidocr-real \
            --output artifacts/rapidocr-real/descriptor.release.json

      - name: Generate RapidOCR manifest
        run: |
          node scripts/rapidocr/generate-manifest.mjs \
            artifacts/rapidocr-real/descriptor.release.json \
            artifacts/rapidocr-real/rapidocr-manifest.json

      - name: Upload RapidOCR assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/rapidocr-real/rapidocr-manifest.json
            artifacts/rapidocr-real/macos-aarch64/rapidocr-macos-aarch64.zip
            artifacts/rapidocr-real/windows-x86_64/rapidocr-windows-x86_64.zip

  # Publish the draft release
  publish:
    needs: [build, rapidocr-assets]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const draft = releases.find(r => r.draft && r.tag_name === context.ref.replace('refs/tags/', ''));
            if (draft) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: draft.id,
                draft: false,
              });
            }
